[gcode_macro LOAD_FILAMENT]
variable_load_distance: 50
variable_purge_distance: 70
variable_nozzle_preheat_temp: 250
variable_retract_distance: -5
variable_retract_speed: 600
variable_turn_off_extruder: True
gcode:
    {% set load_speed = params.LOAD_SPEED|default(600) %}
    {% set purge_speed = params.PURGE_SPEED|default(300) %}
    {% set target_temp = params.TARGET_TEMP|default(nozzle_preheat_temp) %}
    {% set min_temp = params.MIN_TEMP|default(180) %}

    SAVE_GCODE_STATE NAME=load_state

    {% if target_temp >= min_temp %}
        M104 S{target_temp}
        {% set wait_temp = target_temp - 5 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={wait_temp}
    {% else %}
        M104 S{min_temp}
        M109 S{min_temp}
    {% endif %}

    G91
    G92 E0
    G1 E{load_distance} F{load_speed}
    G1 E{purge_distance} F{purge_speed}
    G1 E{retract_distance} F{retract_speed}

    {% if turn_off_extruder %}
        M400
        M104 S0
    {% endif %}

    G90
    RESTORE_GCODE_STATE NAME=load_state
    M117 Filament load complete

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance: 100
variable_nozzle_preheat_temp: 250
variable_turn_off_extruder: False
variable_tip_form: 5
gcode:
    {% set retract_speed = params.RETRACT_SPEED|default(1200) %}
    {% set target_temp = params.TARGET_TEMP|default(nozzle_preheat_temp) %}
    {% set min_temp = params.MIN_TEMP|default(180) %}

    SAVE_GCODE_STATE NAME=unload_state

    {% if printer.extruder.temperature < target_temp %}
        {% if target_temp >= min_temp %}
            M104 S{target_temp}
            {% set wait_temp = target_temp - 5 %}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={wait_temp}
        {% else %}
            M104 S{min_temp}
            M109 S{min_temp}
        {% endif %}
    {% endif %}

    G91
    G92 E0
    G1 E{tip_form} F{retract_speed}
    G1 E-{unload_distance} F{retract_speed}

    {% if turn_off_extruder %}
        M104 S0
    {% endif %}

    G90
    RESTORE_GCODE_STATE NAME=unload_state
    M117 Filament unload complete    
