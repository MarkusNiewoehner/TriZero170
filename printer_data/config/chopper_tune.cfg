[chopper_tune]
debug: False                                                                   ; Enable debug output
inset: 10                                                                      ; Offset from axis limits (mm), to determine work area limits
current_change_step: 25                                                        ; Set run_current change step
measure_time: 1250                                                             ; Set measure time (msec)
required_rpm: 37.5,150,1.5                                                     ; Set range, step of motor rpm in find vibr mode
delay: 500                                                                     ; Set delay between measurements (msec) in find vibr mode
fclk: 12
