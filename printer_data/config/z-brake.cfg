[gcode_macro SAFE_HOME_XY]
description: Senkt Z virtuell um 160 mm ab (per SET_KINEMATIC_POSITION), bevor X und Y gehomt werden (vermeidet Kollision mit Energiekette) – mit reduziertem Current für Sicherheit
gcode:
    # 1. Z-Motoren enablen
    # SET_STEPPER_ENABLE STEPPER=stepper_z ENABLE=1
    # SET_STEPPER_ENABLE STEPPER=stepper_z1 ENABLE=1
    # SET_STEPPER_ENABLE STEPPER=stepper_z2 ENABLE=1

    # 2. Original-Currents sichern
    {% set orig_z_current  = printer.configfile.config['tmc2209 stepper_z'].run_current|default(0.8)|float %}
    {% set orig_z1_current = printer.configfile.config['tmc2209 stepper_z1'].run_current|default(0.8)|float %}
    {% set orig_z2_current = printer.configfile.config['tmc2209 stepper_z2'].run_current|default(0.8)|float %}

    # 3. Debug-Ausgabe: Zeigt den Wert in der Konsole an (entferne das später, wenn's funktioniert)
    RESPOND MSG="Debug: orig_z_current = {orig_z_current} (sollte dein Config-Wert sein, nicht 0.8)"

    # Rest deines Macros wie bisher...
    # 4. Current reduzieren
    SET_TMC_CURRENT STEPPER=stepper_z  CURRENT=0.100 HOLD_CURRENT=0.100
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT=0.100 HOLD_CURRENT=0.100
    SET_TMC_CURRENT STEPPER=stepper_z2 CURRENT=0.100 HOLD_CURRENT=0.100

    # 5. Virtuelle Position setzen und Z absenken
    G90
    SET_KINEMATIC_POSITION Z=0
    G0 Z160 F1200

    # 6. Pause
    G4 P2000

    # 7. Currents zurücksetzen
    SET_TMC_CURRENT STEPPER=stepper_z  CURRENT={orig_z_current} HOLD_CURRENT=0.500
    SET_TMC_CURRENT STEPPER=stepper_z1 CURRENT={orig_z1_current} HOLD_CURRENT=0.500
    SET_TMC_CURRENT STEPPER=stepper_z2 CURRENT={orig_z2_current} HOLD_CURRENT=0.500

    # 8. X und Y homen
    G28 X Y

    # # 9. Z mit Probe neu homen
    #G28 Z

    # 10. Feedback
    RESPOND MSG="Sicheres Homing X/Y abgeschlossen – Z virtuell um 60 mm abgesenkt mit reduziertem Current. Überprüfe Richtung!"

