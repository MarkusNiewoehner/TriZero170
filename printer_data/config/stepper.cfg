[stepper_x]
step_pin: PE11
dir_pin: PE10              # ggf. zu !PE10 invertieren, wenn Richtung falsch
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_endstop: 165
position_max: 165
homing_speed: 30        # langsamer starten bei größerem Build (später erhöhen)
homing_retract_dist: 0
homing_positive_dir: true

[stepper_y]
step_pin: PD8
dir_pin: PB12             # Inversion typisch für CoreXY – teste und ggf. invertieren
enable_pin: !PD9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: 0
position_endstop: 165
position_max: 165
homing_speed: 30
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PE7
interpolate: false
run_current: 1.0 # 0.8           # ggf. auf 0.9–1.0 A erhöhen bei längeren Achsen
#hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PB14
driver_SGTHRS: 80        # starte hoch → tune runter (oft 90–140 bei größerem Setup)

[tmc2209 stepper_y]
uart_pin: PE15
interpolate: false
run_current: 1.0 #0.8
#hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PB13
driver_SGTHRS: 80         # gleiches Tuning wie bei X

# ───────────────────────────────────────────────────────────────
# Tri-Zero Z-Achsen – NEUE Zuordnung (Stand Januar 2026)
# FYSETC Spider v3 – TMC2209 UART – Belt-Driven mit 20-Zahn-Pulleys
# Z        → E3-MOT (Motor7)
# Z1       → E2-MOT (Motor6)
# Z2       → E1-MOT (Motor5)
# ───────────────────────────────────────────────────────────────

[stepper_z]           # Primär Z – jetzt an E3-MOT (Motor7)
step_pin: PD12
dir_pin: !PC4          # Richtung testen! ggf. ! hinzufügen/entfernen
enable_pin: multi_pin:z_enables #enable_pin: !PE8
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop
position_min: -20
position_max: 170     # ← Passe deine reale Z-Höhe an
homing_speed: 30
second_homing_speed: 5
homing_retract_dist: 2
homing_positive_dir: false

[stepper_z1]          # Z1 – jetzt an E2-MOT (Motor6)
step_pin: PE2
dir_pin: PE4         # Inversion aus FYSETC-Beispiel
enable_pin: multi_pin:z_enables #enable_pin: !PE3
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200

[stepper_z2]          # Z2 – jetzt an E1-MOT (Motor5)
step_pin: PE6
dir_pin: PC13         # Inversion aus FYSETC-Beispiel
enable_pin: multi_pin:z_enables #enable_pin: !PE5
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200

# ───────────────────────────────────────────────────────────────
# TMC2209 Treiber – angepasste UART-Pins
# ───────────────────────────────────────────────────────────────

[tmc2209 stepper_z]   # E3-MOT (Motor7)
uart_pin: PA15
interpolate: false
run_current: 1.0      # oder 1.2–1.4, je nach Motor-Temperatur
hold_current: 0.6     # oder 0.7–0.8 – starte mit 60–70 % von run_current
sense_resistor: 0.110
stealthchop_threshold: 0 #999999   # Leises Fahren bei Z

[tmc2209 stepper_z1]  # E2-MOT (Motor6)
uart_pin: PC15
interpolate: false
run_current: 1.0      # oder 1.2–1.4, je nach Motor-Temperatur
hold_current: 0.6     # oder 0.7–0.8 – starte mit 60–70 % von run_current
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z2]  # E1-MOT (Motor5)
uart_pin: PC14
interpolate: false
run_current: 1.0      # oder 1.2–1.4, je nach Motor-Temperatur
hold_current: 0.6     # oder 0.7–0.8 – starte mit 60–70 % von run_current
sense_resistor: 0.110
stealthchop_threshold: 0

